[colors]
background = #cc101214
background-alt = #dd1c2228
foreground = #d7dde7
muted = #8a93a1
accent = #7f92ad
warning = #b9aa74
critical = #c58b93

include-file = ~/.config/polybar/colors-wal.ini

[bar/main]
width = 100%
height = 34
offset-x = 0
offset-y = 0
radius = 0
bottom = false
fixed-center = true
background = ${wal.background}
foreground = ${wal.foreground}
line-size = 0
border-size = 0
padding-left = 3
padding-right = 3
module-margin = 1.2
separator =
font-0 = JetBrainsMono Nerd Font:style=Medium:size=10;3
font-1 = JetBrainsMono Nerd Font:style=Bold:size=11;3
modules-left = launcher wsfx
modules-center = date
modules-right = sysstat diskwarn battery network pulseaudio brightness power
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3
override-redirect = false
enable-struts = true
tray-position = none

[module/launcher]
type = custom/text
content = "󰣇"
content-foreground = ${wal.foreground}
content-background = ${wal.background-alt}
content-padding = 2
click-left = ${HOME}/bin/superrice-polybar-action launcher
click-right = ${HOME}/bin/superrice-polybar-action panel

[module/i3]
type = internal/i3
format = <label-mode><label-state>
index-sort = true
pin-workspaces = true
strip-wsnumbers = true
enable-scroll = false
wrapping-scroll = false
label-mode = " %mode% "
label-mode-foreground = ${wal.background}
label-mode-background = ${wal.accent}
label-mode-padding = 1
label-focused = %name%
label-focused-foreground = ${wal.background}
label-focused-background = ${wal.accent}
label-focused-padding = 2
label-focused-font = 2
label-focused-overline = ${wal.accent}
label-focused-underline = ${wal.accent}
label-unfocused = %name%
label-unfocused-foreground = ${wal.muted}
label-unfocused-background = ${wal.background-alt}
label-unfocused-padding = 2
label-visible = %name%
label-visible-foreground = ${wal.foreground}
label-visible-background = ${wal.background-alt}
label-visible-padding = 2
label-visible-underline = ${wal.background-alt}
label-urgent = %name%
label-urgent-foreground = ${wal.foreground}
label-urgent-background = ${wal.critical}
label-urgent-padding = 2

[module/wsfx]
type = custom/script
exec = ${HOME}/bin/superrice-workspace-switcher
tail = true
format = <label>
format-background = ${wal.background-alt}
format-foreground = ${wal.foreground}
format-padding = 1

[module/battery]
type = custom/script
exec = ${HOME}/bin/superrice-battery
interval = 5
click-left = ${HOME}/bin/superrice-polybar-action panel
format = <label>
format-background = ${wal.background-alt}
format-foreground = ${wal.foreground}
format-padding = 2

[module/sysstat]
type = custom/script
exec = ${HOME}/bin/superrice-sysstat
interval = 2
click-left = ${HOME}/bin/superrice-polybar-action monitor
format = <label>
format-background = ${wal.background-alt}
format-foreground = ${wal.foreground}
format-padding = 2

[module/diskwarn]
type = custom/script
exec = ${HOME}/bin/superrice-diskwarn show
exec-if = ${HOME}/bin/superrice-diskwarn check
interval = 20
click-left = ${HOME}/bin/superrice-polybar-action monitor
format = <label>
format-background = ${wal.background-alt}
format-foreground = ${wal.warning}
format-padding = 2

[module/network]
type = internal/network
interface-type = wireless
interval = 4
click-left = ${HOME}/bin/superrice-polybar-action network
click-middle = ${HOME}/bin/superrice-polybar-action bluetooth
click-right = ${HOME}/bin/superrice-polybar-action network-tui
format-connected = <ramp-signal> <label-connected>
format-connected-background = ${wal.background-alt}
format-connected-foreground = ${wal.foreground}
format-connected-padding = 2
label-connected = %signal%%
format-disconnected = 󰤮 off
format-disconnected-background = ${wal.background-alt}
format-disconnected-foreground = ${wal.muted}
format-disconnected-padding = 2
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 2
click-left = ${HOME}/bin/superrice-polybar-action audio
click-middle = ${HOME}/bin/superrice-polybar-action panel
click-right = ${HOME}/bin/superrice-audio mute
scroll-up = ${HOME}/bin/superrice-audio up
scroll-down = ${HOME}/bin/superrice-audio down
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${wal.background-alt}
format-volume-foreground = ${wal.foreground}
format-volume-padding = 2
label-volume = %percentage%%
label-muted = 󰖁
label-muted-background = ${wal.background-alt}
label-muted-foreground = ${wal.muted}
label-muted-padding = 2
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/brightness]
type = custom/script
exec = ${HOME}/bin/superrice-brightness status
interval = 5
scroll-up = ${HOME}/bin/superrice-brightness up
scroll-down = ${HOME}/bin/superrice-brightness down
format = <label>
format-background = ${wal.background-alt}
format-foreground = ${wal.foreground}
format-padding = 2

[module/power]
type = custom/text
content = ""
content-foreground = ${wal.critical}
content-background = ${wal.background-alt}
content-padding = 2
click-left = ${HOME}/bin/superrice-session menu

[module/date]
type = internal/date
interval = 10
date = %a, %b %d
time = %H:%M
click-left = ${HOME}/bin/superrice-polybar-action calendar
click-middle = ${HOME}/bin/superrice-polybar-action khal
click-right = ${HOME}/bin/superrice-polybar-action agenda
label =  %date%    %time%
label-background = ${wal.background-alt}
label-foreground = ${wal.foreground}
label-padding = 2

[settings]
screenchange-reload = true
pseudo-transparency = false

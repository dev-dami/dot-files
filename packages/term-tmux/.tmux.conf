# SuperRice tmux config - dotbar-inspired + 3-section layout

##### Ergonomics #####
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events off
set -g display-time 1000
set -g repeat-time 300
setw -g automatic-rename off
set -g monitor-activity off
set -g visual-activity off
setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind -r Tab next-window
bind -r BTab previous-window
bind -r n next-window
bind -r p previous-window
bind w choose-tree -Zw
bind Space choose-tree -Zw
bind e last-window

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Visual theme (dotbar-inspired) #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Colors from dotbar
set -g @dotbar-bg "#101214"
set -g @dotbar-fg "#475266"
set -g @dotbar-fg-current "#BFBDB6"
set -g @dotbar-fg-session "#565B66"
set -g @dotbar-fg-prefix "#95E6CB"

set -g status-position bottom
set -g status-interval 2
set -g status-justify absolute-centre
set -g status-left-length 60
set -g status-right-length 60
set -g status-style "bg=#{@dotbar-bg},fg=#{@dotbar-fg}"

set -g message-style "bg=#1c2228,fg=#d7dde7"
set -g mode-style "bg=#7f92ad,fg=#101214"

set -g pane-border-style "fg=#2f3948"
set -g pane-active-border-style "fg=#7f92ad"

# 3-Section Status Bar Layout
# Left: Project type (git + language)
set -g status-left "#[bg=#{@dotbar-bg},fg=#{@dotbar-fg-session}] #(#{HOME}/.config/tmux/scripts/project-type.sh #{pane_current_path}) #[default]"

# Center: Current directory (absolutely centered)
set -g status-format[0] "#[align=centre]#{?client_prefix,#[fg=#{@dotbar-fg-prefix}],#[fg=#{@dotbar-fg-current}]} #(~/.config/tmux/scripts/dir-name.sh #{pane_current_path}) "

# Right: WPM + time
set -g status-right "#[bg=#{@dotbar-bg},fg=#{@dotbar-fg-session}] #(#{HOME}/.config/tmux/scripts/wpm-tracker.sh) wpm  #[fg=#{@dotbar-fg-session}]%H:%M "

# Window format (dotbar style)
setw -g window-status-separator " • "
setw -g window-status-style "bg=#{@dotbar-bg},fg=#{@dotbar-fg}"
setw -g window-status-format " #W "
setw -g window-status-current-format "#[bg=#{@dotbar-bg},fg=#{@dotbar-fg-current}] #W #[fg=#39BAE6,bg=#{@dotbar-bg}]#{?window_zoomed_flag,󰊓,}#[fg=#{@dotbar-bg},bg=default]"
setw -g window-status-activity-style "bg=#{@dotbar-fg-current},fg=#{@dotbar-bg}"
setw -g window-status-bell-style "bg=#{@dotbar-fg-prefix},fg=#{@dotbar-bg},bold"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @yank_selection 'clipboard'

bind I run '~/.tmux/plugins/tpm/bin/install_plugins'
bind U run '~/.tmux/plugins/tpm/bin/update_plugins all'
bind M-u run '~/.tmux/plugins/tpm/bin/clean_plugins'

if-shell '[ -d ~/.tmux/plugins/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"

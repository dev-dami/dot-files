# SuperRice tmux config - ergonomic + theme-aligned

##### Ergonomics #####
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events off
set -g display-time 1000
set -g repeat-time 300
setw -g automatic-rename off
set -g monitor-activity off
set -g visual-activity off
setw -g mode-keys vi

# Fast reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Better splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Window navigation like tabs
bind -r Tab next-window
bind -r BTab previous-window
bind -r n next-window
bind -r p previous-window
bind w choose-tree -Zw
bind Space choose-tree -Zw
bind e last-window

# Vim-like pane movement (no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Prefix + Shift + hjkl to resize quickly
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Visual theme (matches SuperRice palette) #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#101214,fg=#8a93a1"

set -g message-style "bg=#1c2228,fg=#d7dde7"
set -g mode-style "bg=#7f92ad,fg=#101214"

set -g pane-border-style "fg=#2f3948"
set -g pane-active-border-style "fg=#7f92ad"

set -g status-left "#[fg=#101214,bg=#7f92ad,bold] #S #[fg=#7f92ad,bg=#101214]#{prefix_highlight}"
set -g status-right "#[fg=#8a93a1,bg=#101214] %a %b %d  #[fg=#d7dde7,bg=#101214,bold]%H:%M "

setw -g window-status-format "#[fg=#8a93a1,bg=#101214] #I:#W "
setw -g window-status-current-format "#[fg=#101214,bg=#7f92ad,bold] #I:#W "
setw -g window-status-activity-style "fg=#d7dde7,bg=#1c2228"
setw -g window-status-bell-style "fg=#101214,bg=#c58b93,bold"

##### Plugins ("libraries") #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @yank_selection 'clipboard'
set -g @prefix_highlight_output_prefix '#[fg=#101214,bg=#7f92ad,bold] '
set -g @prefix_highlight_output_suffix ' '

# TPM helpers
bind I run '~/.tmux/plugins/tpm/bin/install_plugins'
bind U run '~/.tmux/plugins/tpm/bin/update_plugins all'
bind M-u run '~/.tmux/plugins/tpm/bin/clean_plugins'

if-shell '[ -d ~/.tmux/plugins/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"

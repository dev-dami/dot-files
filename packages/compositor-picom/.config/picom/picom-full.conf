# SuperRice full mode: richer effects (still tuned for smoothness)
backend = "glx";
vsync = true;
use-damage = false;
unredir-if-possible = false;

# Corners and shadows
corner-radius = 10;
shadow = true;
shadow-radius = 12;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.2;

shadow-exclude = [
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "name = 'Notification'"
];

# Fade
detect-client-opacity = true;
fading = true;
fade-in-step = 0.035;
fade-out-step = 0.035;
fade-delta = 6;

# Blur + glass
blur-method = "dual_kawase";
blur-strength = 2;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

# Opacity
inactive-opacity = 0.97;
active-opacity = 1.0;
frame-opacity = 0.97;

opacity-rule = [
  "92:class_g = 'Rofi'",
  "92:class_g = 'SuperRiceTips'",
  "95:class_g = 'SuperRiceSplash'"
];

# Animation options available in animation-capable forks (FT-Labs / picom-animations)
animations = true;
animation-stiffness = 120.0;
animation-window-mass = 0.9;
animation-dampening = 16.0;
animation-clamping = true;
animation-for-open-window = "slide-down";
animation-for-unmap-window = "slide-up";
animation-for-transient-window = "none";

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

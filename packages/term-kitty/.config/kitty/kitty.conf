font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

background_opacity 0.86
dynamic_background_opacity yes

foreground #d4d7dd
background #101216
selection_foreground #101216
selection_background #aab2bf

color0  #161a1f
color8  #5f6874
color1  #8b93a0
color9  #9aa2ae
color2  #a2a9b3
color10 #b0b7c1
color3  #9299a6
color11 #a0a8b3
color4  #7f8896
color12 #8d96a3
color5  #969ead
color13 #a6aebb
color6  #838c99
color14 #939daa
color7  #c9ced6
color15 #e2e6ec

cursor #aab2bf
cursor_text_color background

window_padding_width 14
confirm_os_window_close 0
enable_audio_bell no
remember_window_size yes
initial_window_width 1280
initial_window_height 760
shell fish

tab_bar_style separator
tab_bar_min_tabs 1
tab_bar_edge bottom
tab_bar_margin_height 0.0 0.0
tab_bar_margin_width 0.0
tab_separator ""
tab_title_template " {index} {title} "
active_tab_font_style bold-italic
inactive_tab_font_style normal
active_tab_foreground #101216
active_tab_background #7f92ad
inactive_tab_foreground #8a93a1
inactive_tab_background #1c2228
tab_bar_background #101214

hide_window_decorations no
allow_remote_control yes

# Status bar (using tmux-like format)
status_bar_enabled yes
status_bar_position bottom
status_bar_style separator
status_bar_min_tabs 1
status_bar_template " {session_name} | {tabs} | {layout_name} "

# Tab navigation
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# pywal-generated palette + superrice contrast overrides
include ~/.cache/wal/colors-kitty.conf
include ~/.config/kitty/wal-overrides.conf

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

background_opacity 0.86
dynamic_background_opacity yes

foreground #d4d7dd
background #101216
selection_foreground #101216
selection_background #aab2bf

color0  #161a1f
color8  #5f6874
color1  #8b93a0
color9  #9aa2ae
color2  #a2a9b3
color10 #b0b7c1
color3  #9299a6
color11 #a0a8b3
color4  #7f8896
color12 #8d96a3
color5  #969ead
color13 #a6aebb
color6  #838c99
color14 #939daa
color7  #c9ced6
color15 #e2e6ec

cursor #aab2bf
cursor_text_color background

window_padding_width 14
confirm_os_window_close 0
enable_audio_bell no
remember_window_size yes
initial_window_width 1280
initial_window_height 760
shell fish

tab_bar_style hidden
hide_window_decorations no
allow_remote_control yes

# pywal-generated palette + superrice contrast overrides
include ~/.cache/wal/colors-kitty.conf
include ~/.config/kitty/wal-overrides.conf
